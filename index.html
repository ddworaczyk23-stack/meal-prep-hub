<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍗 Meal Prep Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0E1A; font-family: 'Inter', system-ui, sans-serif; font-size: 13px; color: #F9FAFB; }
    button { font-family: inherit; border: none; background: none; cursor: pointer; }

    #root { min-height: 100vh; }

    /* Header */
    .header { background: #0D1117; border-bottom: 1px solid #1F2937; padding: 10px 14px 10px; position: sticky; top: 0; z-index: 99; }
    .header-stripe { height: 4px; background: repeating-linear-gradient(90deg, #B91C1C 0, #B91C1C 8%, #F9FAFB 8%, #F9FAFB 9%, #3B82F6 9%, #3B82F6 17%, #F9FAFB 17%, #F9FAFB 18%); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 16px; font-weight: 800; color: #B91C1C; letter-spacing: -0.5px; margin-bottom: 8px; }
    .targets-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .target-field { display: flex; flex-direction: column; gap: 2px; }
    .target-label { font-size: 9px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .target-input { background: #1F2937; border: 1px solid #374151; border-radius: 6px; color: #F9FAFB; font-size: 13px; font-weight: 700; padding: 4px 8px; width: 80px; outline: none; font-family: inherit; }
    .target-input:focus { border-color: #B91C1C; }

    /* Controls */
    .controls { background: #0D1117; border-bottom: 1px solid #1F2937; padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }
    .control-label { font-size: 10px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .pills-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill { padding: 3px 9px; border-radius: 14px; font-size: 11px; font-weight: 400; border: 1px solid #1F2937; color: #6B7280; transition: all 0.15s; }
    .pill.active-orange { border-color: #B91C1C; background: #B91C1C20; color: #B91C1C; font-weight: 600; }
    .pill.active-green { border-color: #10B981; background: #10B98120; color: #10B981; font-weight: 600; }

    /* Budget bar */
    .budget { display: flex; gap: 6px; padding: 10px 14px; background: #0D1117; border-bottom: 1px solid #1F2937; }
    .budget-tile { flex: 1; background: #111827; border-radius: 8px; padding: 8px 9px; border-top: 2px solid #9CA3AF; }
    .budget-label { font-size: 9px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    .budget-num { font-size: 17px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
    .budget-sub { font-size: 10px; color: #6B7280; margin-top: 2px; }
    .budget-sep { display: flex; align-items: center; color: #374151; font-size: 18px; font-weight: 300; }

    /* Phase callout */
    .phase-callout { margin: 10px 14px 0; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
    .phase-callout-label { font-size: 11px; font-weight: 700; }
    .phase-callout-sub { font-size: 11px; color: #6B7280; }

    /* Recipe grid */
    .grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding: 14px; }
    .recipe-card { background: #111827; border: 1px solid #1F2937; border-radius: 10px; padding: 12px; cursor: pointer; border-top: 3px solid #ccc; transition: transform 0.1s; }
    .recipe-card:hover { transform: translateY(-1px); }
    .recipe-emoji { font-size: 26px; margin-bottom: 6px; }
    .recipe-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .recipe-tag { font-size: 10px; color: #6B7280; margin-bottom: 9px; }
    .chip { display: inline-block; font-size: 10px; font-weight: 700; border-radius: 5px; padding: 2px 6px; margin-right: 4px; margin-bottom: 3px; }
    .tag { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; letter-spacing: 0.3px; }
    .card-open { margin-top: 9px; font-size: 11px; color: #4B5563; display: flex; justify-content: flex-end; }

    /* Recipe detail */
    .recipe-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #1F2937; background: #0D1117; }
    .back-btn { background: none; border: 1px solid #1F2937; color: #6B7280; border-radius: 7px; padding: 4px 10px; cursor: pointer; font-size: 11px; }
    .recipe-head-emoji { font-size: 22px; }
    .recipe-head-name { font-weight: 700; font-size: 15px; }
    .recipe-head-sub { font-size: 10px; color: #6B7280; }

    .detail-body { padding: 14px; }

    /* Macro tiles */
    .section-label { font-size: 10px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .macro-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
    .macro-tile { text-align: center; background: #0D1117; border-radius: 7px; padding: 8px 4px; border-bottom: 2px solid #ccc; }
    .macro-num { font-size: 19px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
    .macro-lbl { font-size: 9px; color: #6B7280; margin-top: 3px; }
    .macro-goal { font-size: 9px; color: #4B5563; margin-top: 1px; }
    .fiber-bar-bg { background: #1F2937; border-radius: 3px; height: 5px; overflow: hidden; margin-top: 3px; }
    .fiber-bar-fill { height: 100%; transition: width 0.3s; }

    /* Levers */
    .lever-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; border: 1px solid #1F2937; background: #0D1117; margin-bottom: 5px; transition: all 0.15s; }
    .lever-row.active { border-color: #B91C1C; background: #B91C1C12; }
    .checkbox { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; border: 2px solid #374151; background: transparent; display: flex; align-items: center; justify-content: center; }
    .checkbox.active { border-color: #B91C1C; background: #B91C1C; }
    .check-mark { color: #000; font-size: 9px; font-weight: 900; }
    .lever-label { font-size: 12px; font-weight: 600; color: #9CA3AF; }
    .lever-label.active { color: #F9FAFB; }
    .lever-macros { font-size: 10px; color: #6B7280; margin-top: 1px; }

    /* Breakdown table */
    .breakdown-card { background: #111827; border-radius: 8px; padding: 2px 12px; }
    .breakdown-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #1F2937; font-size: 12px; }
    .breakdown-row.total { font-weight: 800; border-bottom: none; padding-top: 8px; }
    .bd-label { color: #9CA3AF; flex: 1; }
    .bd-cal { color: #B91C1C; width: 50px; text-align: right; }
    .bd-prot { color: #60A5FA; width: 50px; text-align: right; }
    .bd-fib { color: #10B981; width: 40px; text-align: right; }

    /* Dinner headroom */
    .dinner-card { background: #0D1117; border: 1px solid #1F2937; border-radius: 10px; padding: 12px; margin-top: 12px; }
    .dinner-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
    .dinner-tile { text-align: center; background: #111827; border-radius: 8px; padding: 8px 6px; }
    .dinner-num { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
    .dinner-lbl { font-size: 9px; color: #6B7280; margin-top: 3px; }
    .dinner-over { font-size: 9px; color: #EF4444; margin-top: 1px; }
    .dinner-footer { font-size: 10px; color: #374151; border-top: 1px solid #1F2937; padding-top: 7px; }

    /* Recipe toggle */
    .recipe-toggle { width: 100%; padding: 9px 12px; background: #111827; border: 1px solid #1F2937; border-radius: 8px; color: #9CA3AF; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; }
    .recipe-body { background: #111827; border: 1px solid #1F2937; border-top: none; border-radius: 0 0 8px 8px; padding: 12px; }
    .ingr-item { font-size: 12px; color: #D1D5DB; padding: 4px 0; border-bottom: 1px solid #1F2937; display: flex; gap: 7px; align-items: center; }
    .step-row { display: flex; gap: 9px; margin-bottom: 9px; align-items: flex-start; }
    .step-num { width: 20px; height: 20px; border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 12px; color: #D1D5DB; line-height: 1.5; padding-top: 2px; }
    .tip-box { margin-top: 10px; padding: 9px 11px; background: #0D1117; border-radius: 8px; font-size: 11px; color: #9CA3AF; line-height: 1.5; }

    .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .mt-8 { margin-top: 8px; }
    .mt-14 { margin-top: 14px; }
    .mb-14 { margin-bottom: 14px; }
    .mb-12 { margin-bottom: 12px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 3px; }
    .mb-6 { margin-bottom: 6px; }

    .footer { padding: 10px 14px 20px; font-size: 10px; color: #374151; text-align: center; }

    /* Servings slider */
    .servings-row { display: flex; align-items: center; gap: 10px; }
    .servings-slider { width: 140px; accent-color: #B91C1C; }
    .servings-val { font-size: 13px; font-weight: 700; color: #B91C1C; min-width: 70px; }

    /* Morning editor */
    .link-btn { background: none; border: none; color: #6B7280; font-size: 10px; text-decoration: underline; cursor: pointer; padding: 0; }
    .morning-edit-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-top: 8px; }
    .morning-field { display: flex; flex-direction: column; gap: 2px; }
    .morning-field label { font-size: 9px; color: #6B7280; text-transform: uppercase; }
    .morning-field input { background: #1F2937; border: 1px solid #374151; border-radius: 6px; color: #F9FAFB; font-size: 12px; padding: 4px 6px; width: 100%; outline: none; font-family: inherit; }

    /* Batch / shopping list */
    .batch-banner { margin: 10px 14px 0; padding: 8px 12px; border-radius: 8px; background: #10B98115; border: 1px solid #10B98130; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .shopping-list { background: #0D1117; border: 1px solid #1F2937; border-radius: 8px; padding: 10px 12px; }
    .shopping-item { font-size: 12px; color: #D1D5DB; padding: 4px 0; border-bottom: 1px solid #1F2937; display: flex; gap: 7px; align-items: center; }
    .batch-toggle-btn { padding: 6px 12px; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid #1F2937; }
  </style>
</head>

//  STATE
// ═══════════════════════════════════════════════════

const STORAGE_KEY = "mealPrepHubState";

const DEFAULT_STATE = {
  targetCal:       2750,
  targetProtein:   175,
  targetFiber:     30,
  riceVal:         1.5,
  veggieOverrides: {},  // { recipeId: veggieId } — only set when user overrides
  cuties:          true,
  riceCrispy:      false,
  levers:          {},   // { recipeId: number[] } — arrays in storage, Sets at runtime
  activeId:        null,
  servings:        BASE_SERVINGS,
  morning:         DEFAULT_MORNING,
  thisWeeksBatch:  null,
  editingMorning:  false,
};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    const levers = {};
    Object.keys(saved.levers || {}).forEach(k => { levers[k] = new Set(saved.levers[k]); });
    return Object.assign({}, DEFAULT_STATE, saved, { levers });
  } catch (e) {
    return Object.assign({}, DEFAULT_STATE);
  }
}

function saveState() {
  const levers = {};
  Object.keys(state.levers).forEach(k => { levers[k] = Array.from(state.levers[k]); });
  const toSave = Object.assign({}, state, { levers });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
}

let state = loadState();

function setState(updates) {
  state = Object.assign({}, state, updates);
  saveState();
  render();
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════

function add(...items) {
  return items.reduce((a, b) => ({
    cal:     (a.cal     || 0) + (b && b.cal     || 0),
    protein: (a.protein || 0) + (b && b.protein || 0),
    carbs:   (a.carbs   || 0) + (b && b.carbs   || 0),
    fat:     (a.fat     || 0) + (b && b.fat     || 0),
    fiber:   (a.fiber   || 0) + (b && b.fiber   || 0),
  }), { cal:0, protein:0, carbs:0, fat:0, fiber:0 });
}

function clamp(n) { return Math.round(Math.max(0, n)); }

function fmtNum(n) {
  if (Math.abs(n - Math.round(n)) < 0.01) return String(Math.round(n));
  return (Math.round(n * 100) / 100).toString();
}

// Builds the original-unit batch quantity (what you'd buy/measure), scaled to servings.
function formatOriginalQty(qtyPerServing, unit, servings) {
  const total = qtyPerServing * servings;
  if (unit === "tbsp" && total >= 16) return `${fmtNum(total / 16)} cup${total / 16 !== 1 ? "s" : ""}`;
  if (unit === "tsp"  && total >= 3)  return `${fmtNum(total / 3)} tbsp`;
  const plural = total !== 1 ? "s" : "";
  if (unit === "avocado")  return `${fmtNum(total)} avocado${plural}`;
  if (unit === "tortilla") return `${fmtNum(total)} tortilla${plural}`;
  if (unit === "cup")      return `${fmtNum(total)} cup${plural}`;
  return `${fmtNum(total)} ${unit}`;
}

// Gram add-on for weighing on a kitchen scale when adding to the slow cooker or portioning containers.
function formatGrams(gramsPerServing, servings) {
  return `${fmtNum(gramsPerServing * servings)}g`;
}

function leverBatchText(lv, servings) {
  return `${formatOriginalQty(lv.qty, lv.unit, servings)} (${formatGrams(lv.grams, servings)}) ${lv.item} — ${lv.note}`;
}

function getLunchMacros(rec) {
  const rice      = RICE.find(r => r.value === state.riceVal);
  const veggieId  = state.veggieOverrides[rec.id] || rec.veggie;
  const veggie    = VEGGIES.find(v => v.id === veggieId);
  const lvSet     = state.levers[rec.id] || new Set();
  const lvTotal = rec.levers.reduce((acc, lv, i) =>
    lvSet.has(i) ? add(acc, lv) : acc,
    { cal:0, protein:0, carbs:0, fat:0, fiber:0 }
  );
  return add(CHICKEN, rice, veggie, rec.sauce, lvTotal,
    state.cuties ? CUTIES : {}, state.riceCrispy ? TREAT : {});
}

function toggleLever(recId, idx) {
  const prev = state.levers;
  const s = new Set(prev[recId] || []);
  s.has(idx) ? s.delete(idx) : s.add(idx);
  setState({ levers: Object.assign({}, prev, { [recId]: s }) });
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════

function render() {
  const rice = RICE.find(r => r.value === state.riceVal);
  const recipe = RECIPES.find(r => r.id === state.activeId);

  document.getElementById("root").innerHTML = recipe
    ? renderDetail(rice, recipe)
    : renderGrid(rice);

  // Re-attach input listeners after innerHTML replacement
  document.querySelectorAll(".target-input").forEach(input => {
    input.addEventListener("change", function() {
      const key = this.dataset.target;
      const val = parseInt(this.value) || 0;
      setState({ [key]: val });
    });
    input.addEventListener("click", function(e) { e.stopPropagation(); });
  });

  const servingsInput = document.querySelector("[data-servings]");
  if (servingsInput) {
    servingsInput.addEventListener("input", function() {
      setState({ servings: parseInt(this.value) || BASE_SERVINGS });
    });
    servingsInput.addEventListener("click", function(e) { e.stopPropagation(); });
  }

  document.querySelectorAll("[data-morning]").forEach(input => {
    input.addEventListener("change", function() {
      const key = this.dataset.morning;
      const val = parseFloat(this.value) || 0;
      setState({ morning: Object.assign({}, state.morning, { [key]: val }) });
    });
    input.addEventListener("click", function(e) { e.stopPropagation(); });
  });

  attachEvents();
}

        <div class="target-field">
          <div class="target-label">Daily Calories</div>
          <input class="target-input" type="number" data-target="targetCal" value="${state.targetCal}" min="0" step="50" />
        </div>
        <div class="target-field">
          <div class="target-label">Protein (g)</div>
          <input class="target-input" type="number" data-target="targetProtein" value="${state.targetProtein}" min="0" step="5" />
        </div>
        <div class="target-field">
          <div class="target-label">Fiber (g)</div>
          <input class="target-input" type="number" data-target="targetFiber" value="${state.targetFiber}" min="0" step="5" />
        </div>
      </div>
    </div>`;
}

// ── Grid view ─────────────────────────────────────────

function renderGrid(rice) {
  const lunchRange = RECIPES.map(r => getLunchMacros(r).cal);
  const lunchMin = Math.round(Math.min(...lunchRange));
  const lunchMax = Math.round(Math.max(...lunchRange));
  const dinnerMin = Math.round(state.targetCal - state.morning.cal - lunchMax);
  const dinnerMax = Math.round(state.targetCal - state.morning.cal - lunchMin);

  return `
    ${headerHTML()}

    <div class="controls">
      <div class="flex-row">
        <div>
          <div class="control-label">Rice (cooked)</div>
          <div class="pills-row">
            ${RICE.map(r => `
              <button class="pill${state.riceVal === r.value ? ' active-orange' : ''}" data-rice="${r.value}">
                ${r.label}
              </button>`).join("")}
          </div>
        </div>
        <div>
          <div class="control-label">Sides</div>
          <div class="pills-row">
            <button class="pill${state.cuties ? ' active-green' : ''}" data-toggle="cuties">🍊 2 Cuties</button>
            <button class="pill${state.riceCrispy ? ' active-green' : ''}" data-toggle="riceCrispy">🍬 Rice Crispy</button>
          </div>
        </div>
      </div>
    </div>

    <div class="budget">
      <div class="budget-tile" style="border-top-color:#9CA3AF">
        <div class="budget-label">☀️ Morning</div>
        <div class="budget-num" style="color:#F9FAFB">${state.morning.cal}</div>
        <div class="budget-sub">${state.morning.protein}g protein · ${state.morning.fiber}g fiber</div>
        <button class="link-btn" style="margin-top:4px" data-toggle-morning-edit="1">${state.editingMorning ? "Close" : "Edit"}</button>
      </div>
      <div class="budget-sep">+</div>
      <div class="budget-tile" style="border-top-color:#B91C1C">
        <div class="budget-label">🍱 Lunch Range</div>
        <div class="budget-num" style="color:#B91C1C">${lunchMin}–${lunchMax}</div>
        <div class="budget-sub">varies by recipe</div>
      </div>
      <div class="budget-sep">=</div>
      <div class="budget-tile" style="border-top-color:#3B82F6">
        <div class="budget-label">🌙 Dinner Target</div>
        <div class="budget-num" style="color:#60A5FA">${dinnerMin}–${dinnerMax}</div>
        <div class="budget-sub">${state.targetCal} cal · ${state.targetProtein}g protein</div>
      </div>
    </div>

    ${state.editingMorning ? `
      <div style="margin:10px 14px 0;background:#111827;border:1px solid #1F2937;border-radius:8px;padding:10px 12px">
        <div class="section-label" style="margin-bottom:0">Edit Morning Meal</div>
        <div class="morning-edit-grid">
          ${["cal","protein","carbs","fat","fiber"].map(k => `
            <div class="morning-field">
              <label>${k}</label>
              <input type="number" data-morning="${k}" value="${state.morning[k]}" min="0" />
            </div>`).join("")}
        </div>
      </div>` : ""}

    ${state.thisWeeksBatch ? (() => {
      const rec = RECIPES.find(r => r.id === state.thisWeeksBatch);
      return rec ? `
        <div class="batch-banner">
          <span style="font-size:12px"><strong>📌 This Week's Batch:</strong> ${rec.emoji} ${rec.name}</span>
          <div style="display:flex;gap:6px">
            <button class="batch-toggle-btn" style="background:#10B98120;color:#10B981;border-color:#10B98140" data-recipe="${rec.id}">View</button>
            <button class="batch-toggle-btn" style="background:transparent;color:#6B7280" data-clear-batch="1">Clear</button>
          </div>
        </div>` : "";
    })() : ""}

    <div class="grid">
      ${RECIPES.map(rec => {
        const m        = getLunchMacros(rec);
        const lvSet    = state.levers[rec.id] || new Set();
        const recVeggie = VEGGIES.find(v => v.id === (state.veggieOverrides[rec.id] || rec.veggie));
        const isBatch  = state.thisWeeksBatch === rec.id;
        return `
          <div class="recipe-card" style="border-top-color:${rec.color}${isBatch ? ';outline:2px solid #10B981' : ''}" data-recipe="${rec.id}">
            <div class="recipe-emoji">${rec.emoji}</div>
            <div class="recipe-name">${rec.name} ${isBatch ? '📌' : ''}</div>
            <div style="font-size:10px;color:#6B7280;margin-bottom:9px">${rec.tag} · ${recVeggie.emoji} ${recVeggie.label}</div>
            <div class="mb-6">
              <span class="chip" style="color:#B91C1C;background:#B91C1C18">${clamp(m.cal)} cal</span>
              <span class="chip" style="color:#60A5FA;background:#60A5FA18">${clamp(m.protein)}g prot</span>
              <span class="chip" style="color:#10B981;background:#10B98118">${Math.round(m.fiber)}g fiber</span>
            </div>
            ${lvSet.size > 0 ? `<div><span class="tag" style="color:#B91C1C;background:#B91C1C20">${lvSet.size} lever${lvSet.size > 1 ? "s" : ""} active</span></div>` : ""}
            <div class="card-open">Open recipe →</div>
          </div>`;
      }).join("")}
    </div>

    <div class="footer">All recipes: written for 8 servings (4.5 lb batch) · open a recipe to adjust batch size · Slow cooker · Freezer-ready</div>
  `;
}

// ── Detail view ───────────────────────────────────────

function renderDetail(rice, recipe) {
  const activeVeggieId = state.veggieOverrides[recipe.id] || recipe.veggie;
  const activeVeggie   = VEGGIES.find(v => v.id === activeVeggieId);
  const isOverridden   = !!state.veggieOverrides[recipe.id];

  const lunch  = getLunchMacros(recipe);
  const lvSet  = state.levers[recipe.id] || new Set();
  const dinner = {
    cal:     state.targetCal     - state.morning.cal     - lunch.cal,
    protein: state.targetProtein - state.morning.protein - lunch.protein,
    fiber:   state.targetFiber   - state.morning.fiber   - lunch.fiber,
  };

  const lunchBudgetCal  = clamp(state.targetCal     - state.morning.cal);
  const lunchBudgetProt = clamp(state.targetProtein - state.morning.protein);
  const lunchBudgetFib  = clamp(state.targetFiber   - state.morning.fiber);

  const breakdownRows = [
    { ...CHICKEN,      label: "9 oz chicken thigh (255g raw)" },
    { ...rice,         label: `White rice — ${rice.label}` },
    { ...activeVeggie, label: `${activeVeggie.label} (1/2 cup, ${activeVeggie.grams}g)` },
    { ...recipe.sauce, label: recipe.name + " sauce" },
    ...(state.cuties     ? [{ ...CUTIES, label: "2 Cuties" }] : []),
    ...(state.riceCrispy ? [{ ...TREAT,  label: "Rice Crispy Treat" }] : []),
    ...recipe.levers.filter((_, i) => lvSet.has(i)).map(lv => ({ ...lv, label: `+ ${lv.label} (${lv.grams}g)` })),
  ];

  function fiberBar(val, target, color) {
    const pct = Math.min(100, (val / target) * 100);
    const over = val > target;
    return `<div class="fiber-bar-bg"><div class="fiber-bar-fill" style="width:${pct}%;background:${over ? '#EF4444' : color}"></div></div>`;
  }

  return `
    ${headerHTML()}

    <div class="recipe-head">
      <button class="back-btn" data-back="1">← Recipes</button>
      <span class="recipe-head-emoji">${recipe.emoji}</span>
      <div style="flex:1">
        <div class="recipe-head-name">${recipe.name}</div>
        <div class="recipe-head-sub">${recipe.tag} · ${fmtNum(state.servings * RAW_OZ_PER_SERVING / 16)} lb (${fmtNum(state.servings * RAW_G_PER_SERVING)}g) batch · ${state.servings} servings · Freezer-ready</div>
      </div>
      <button class="batch-toggle-btn" style="${state.thisWeeksBatch === recipe.id ? 'background:#10B98120;color:#10B981;border-color:#10B98140' : 'background:transparent;color:#6B7280'}" data-set-batch="${recipe.id}">
        ${state.thisWeeksBatch === recipe.id ? '✓ This Week' : '📌 Set as This Week'}
      </button>
    </div>

    <div class="detail-body">

      <!-- Batch Size -->
      <div class="mb-14" style="background:#111827;border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div class="control-label" style="margin-bottom:0">Batch Size for This Recipe</div>
        <div class="servings-row">
          <input class="servings-slider" type="range" min="4" max="12" step="1" value="${state.servings}" data-servings="1" />
          <span class="servings-val">${state.servings} servings</span>
        </div>
      </div>

      <!-- Live Macro Tiles -->
      <div style="background:#111827;border-radius:10px;padding:12px;margin-bottom:12px;border-top:3px solid ${recipe.color}">
        <div class="section-label" style="margin-bottom:10px">Live Lunch Macros</div>
        <div class="macro-grid">
          <div class="macro-tile" style="border-bottom-color:#B91C1C">
            <div class="macro-num" style="color:#B91C1C">${clamp(lunch.cal)}</div>
            <div class="macro-lbl">Calories</div>
            <div class="macro-goal">of ${lunchBudgetCal}</div>
            ${fiberBar(clamp(lunch.cal), lunchBudgetCal, "#B91C1C")}
          </div>
          <div class="macro-tile" style="border-bottom-color:#60A5FA">
            <div class="macro-num" style="color:#60A5FA">${clamp(lunch.protein)}g</div>
            <div class="macro-lbl">Protein</div>
            <div class="macro-goal">of ${lunchBudgetProt}g</div>
            ${fiberBar(clamp(lunch.protein), lunchBudgetProt, "#60A5FA")}
          </div>
          <div class="macro-tile" style="border-bottom-color:#FBBF24">
            <div class="macro-num" style="color:#FBBF24">${clamp(lunch.carbs)}g</div>
            <div class="macro-lbl">Carbs</div>
          </div>
          <div class="macro-tile" style="border-bottom-color:#10B981">
            <div class="macro-num" style="color:#10B981">${Math.round(lunch.fiber)}g</div>
            <div class="macro-lbl">Fiber</div>
            <div class="macro-goal">of ${lunchBudgetFib}g</div>
            ${fiberBar(Math.round(lunch.fiber), lunchBudgetFib, "#10B981")}
          </div>
        </div>
      </div>

      <!-- Dinner Headroom -->
      <div class="dinner-card mb-14">
        <div class="section-label" style="margin-bottom:10px">🌙 Dinner Headroom</div>
        <div class="dinner-grid">
          ${[
            { label: "Calories left",  val: dinner.cal,     unit: "",  color: "#B91C1C" },
            { label: "Protein left",   val: dinner.protein, unit: "g", color: "#60A5FA" },
            { label: "Fiber left",     val: dinner.fiber,   unit: "g", color: "#10B981" },
          ].map(m => {
            const over = m.val < 0;
            return `
              <div class="dinner-tile">
                <div class="dinner-num" style="color:${over ? '#EF4444' : m.color}">
                  ${over ? "−" : ""}${Math.abs(Math.round(m.val))}${m.unit}
                </div>
                <div class="dinner-lbl">${m.label}</div>
                ${over ? '<div class="dinner-over">over target</div>' : ""}
              </div>`;
          }).join("")}
        </div>
        <div class="dinner-footer">
          Morning ${state.morning.cal} cal + Lunch ${clamp(lunch.cal)} cal = ${clamp(state.morning.cal + lunch.cal)} of ${state.targetCal} cal daily target
        </div>
      </div>

      <!-- Veggie -->
      <div class="mb-14">
        <div class="section-label">Vegetable (1/2 cup, ${activeVeggie.grams}g)</div>
        <div style="background:#0D1117;border-radius:8px;padding:10px 12px;border:1px solid #1F2937">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:18px">${activeVeggie.emoji}</span>
            <span style="font-weight:600;font-size:13px">${activeVeggie.label}</span>
            ${!isOverridden ? `<span class="tag" style="color:#10B981;background:#10B98120">Recommended</span>` : `<span class="tag" style="color:#B91C1C;background:#B91C1C20">Overridden</span>`}
            <span style="font-size:10px;color:#6B7280;margin-left:auto">${activeVeggie.cal} cal · ${activeVeggie.protein}g prot · ${activeVeggie.fiber}g fiber</span>
          </div>
          <div style="font-size:10px;color:#10B981;padding:4px 6px;background:#10B98110;border-radius:4px;border-left:2px solid #10B981;margin-bottom:8px">📦 ${formatOriginalQty(0.5, "cup", state.servings)} (${formatGrams(activeVeggie.grams, state.servings)}) ${activeVeggie.label.toLowerCase()} for full batch (½ cup × ${state.servings} servings)</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            ${VEGGIES.map(v => `
              <button class="pill${activeVeggieId === v.id ? ' active-orange' : ''}" data-veggie-override="${v.id}">
                ${v.emoji} ${v.label}
              </button>`).join("")}
            ${isOverridden ? `<button class="pill active-green" data-veggie-reset="1">↺ Reset</button>` : ""}
          </div>
        </div>
      </div>

      <!-- Bulk Levers -->
      <div class="mb-14">
        <div class="section-label">Bulk Levers</div>
        ${recipe.levers.map((lv, idx) => {
          const active = lvSet.has(idx);
          return `
            <div class="lever-row${active ? ' active' : ''}" data-lever="${idx}">
              <div class="checkbox${active ? ' active' : ''}">
                ${active ? '<span class="check-mark">✓</span>' : ''}
              </div>
              <div style="flex:1">
                <div class="lever-label${active ? ' active' : ''}">${lv.label}</div>
                <div class="lever-macros">+${lv.cal} cal · +${lv.protein}g prot · +${Math.round(lv.fiber)}g fiber · +${lv.fat}g fat</div>
                ${active ? `<div style="font-size:10px;color:#B91C1C;margin-top:4px;padding:4px 6px;background:#B91C1C10;border-radius:4px;border-left:2px solid #B91C1C">📦 ${leverBatchText(lv, state.servings)}</div>` : ""}
              </div>
            </div>`;
        }).join("")}
      </div>

      <!-- Split Batch -->
      <div class="mb-14" style="background:#111827;border-radius:8px;padding:10px 12px;border-left:3px solid ${recipe.color}">
        <div class="section-label" style="margin-bottom:6px">🔀 Split This Batch</div>
        <div style="font-size:11px;color:#9CA3AF;line-height:1.5">${recipe.splitTip}</div>
      </div>

      <!-- Ingredients (full shopping list, this batch) -->
      <div class="mb-14">
        <div class="section-label">📋 Ingredients (${state.servings} servings)</div>
        <div class="shopping-list">
          <div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${fmtNum(state.servings * RAW_OZ_PER_SERVING / 16)} lbs (${formatGrams(RAW_G_PER_SERVING, state.servings)}) raw boneless skinless chicken thighs</span></div>
          <div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${formatOriginalQty(state.riceVal, "cup", state.servings)} (${formatGrams(rice.grams, state.servings)}) cooked white rice (cook fresh to yield this amount)</span></div>
          <div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${formatOriginalQty(0.5, "cup", state.servings)} (${formatGrams(activeVeggie.grams, state.servings)}) ${activeVeggie.label.toLowerCase()}</span></div>
          ${state.cuties ? `<div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${state.servings * 2} Cuties (mandarins)</span></div>` : ""}
          ${state.riceCrispy ? `<div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${state.servings} Rice Crispy Treats</span></div>` : ""}
          ${recipe.levers.filter((_, i) => lvSet.has(i)).map(lv => `
            <div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${leverBatchText(lv, state.servings)}</span></div>`).join("")}
          <div style="font-size:10px;color:#6B7280;margin-top:8px;padding-top:8px;border-top:1px solid #1F2937">
            Plus the sauce/seasoning ingredients (written for ${BASE_SERVINGS} servings — scale ×${fmtNum(state.servings / BASE_SERVINGS)} for your ${state.servings}-serving batch):
          </div>
          ${recipe.ingredients.slice(1).map(ing => `
            <div class="shopping-item"><span style="color:${recipe.color};font-size:14px">·</span><span>${ing}</span></div>`).join("")}
        </div>
      </div>

      <!-- Breakdown -->
      <div class="mb-14">
        <div class="section-label">Meal Breakdown</div>
        <div class="breakdown-card">
          ${breakdownRows.map(row => `
            <div class="breakdown-row">
              <span class="bd-label">${row.label}</span>
              <span class="bd-cal">${clamp(row.cal)} cal</span>
              <span class="bd-prot">${clamp(row.protein)}g prot</span>
              <span class="bd-fib">${Math.round(row.fiber || 0)}g fib</span>
            </div>`).join("")}
          <div class="breakdown-row total">
            <span class="bd-label" style="color:#F9FAFB">Lunch Total</span>
            <span class="bd-cal">${clamp(lunch.cal)}</span>
            <span class="bd-prot">${clamp(lunch.protein)}g</span>
            <span class="bd-fib">${Math.round(lunch.fiber)}g</span>
          </div>
        </div>
      </div>

      <!-- Method -->
      <div class="mt-14">
        <div class="section-label">Method</div>
        ${recipe.method.map((step, i) => `
          <div class="step-row">
            <div class="step-num" style="background:${recipe.color}">${i + 1}</div>
            <div class="step-text">${step}</div>
          </div>`).join("")}
        <div class="tip-box" style="border-left:3px solid ${recipe.color}">💡 ${recipe.tip}</div>
      </div>

    </div>
  `;
}

// ═══════════════════════════════════════════════════
//  EVENT DELEGATION
// ═══════════════════════════════════════════════════

// ── Boot ─────────────────────────────────────────────

// Single delegated listener attached once — reads live `state` on every click
document.getElementById("root").addEventListener("click", function(e) {
  const riceBtn = e.target.closest("[data-rice]");
  if (riceBtn) { setState({ riceVal: parseFloat(riceBtn.dataset.rice) }); return; }

  const toggleBtn = e.target.closest("[data-toggle]");
  if (toggleBtn) {
    const key = toggleBtn.dataset.toggle;
    setState({ [key]: !state[key] });
    return;
  }

  const recBtn = e.target.closest("[data-recipe]");
  if (recBtn) { setState({ activeId: recBtn.dataset.recipe }); return; }

  const backBtn = e.target.closest("[data-back]");
  if (backBtn) { setState({ activeId: null }); return; }

  const veggieOverrideBtn = e.target.closest("[data-veggie-override]");
  if (veggieOverrideBtn && state.activeId) {
    const overrides = Object.assign({}, state.veggieOverrides);
    const rec = RECIPES.find(r => r.id === state.activeId);
    if (veggieOverrideBtn.dataset.veggieOverride === rec.veggie) {
      delete overrides[state.activeId]; // selecting default = reset
    } else {
      overrides[state.activeId] = veggieOverrideBtn.dataset.veggieOverride;
    }
    setState({ veggieOverrides: overrides });
    return;
  }

  const veggieResetBtn = e.target.closest("[data-veggie-reset]");
  if (veggieResetBtn && state.activeId) {
    const overrides = Object.assign({}, state.veggieOverrides);
    delete overrides[state.activeId];
    setState({ veggieOverrides: overrides });
    return;
  }

  const leverBtn = e.target.closest("[data-lever]");
  if (leverBtn && state.activeId) {
    toggleLever(state.activeId, parseInt(leverBtn.dataset.lever));
    return;
  }

  const morningEditBtn = e.target.closest("[data-toggle-morning-edit]");
  if (morningEditBtn) { setState({ editingMorning: !state.editingMorning }); return; }

  const setBatchBtn = e.target.closest("[data-set-batch]");
  if (setBatchBtn) {
    const id = setBatchBtn.dataset.setBatch;
    setState({ thisWeeksBatch: state.thisWeeksBatch === id ? null : id });
    return;
  }

  const clearBatchBtn = e.target.closest("[data-clear-batch]");
  if (clearBatchBtn) { setState({ thisWeeksBatch: null }); return; }
});

function attachEvents() {} // no-op, kept for render() call compatibility

render();
</script>
